<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Esports Bet - Full Version</title>
    <!-- PWA Fix -->
    {% raw %}
    <link rel="manifest" href="data:application/manifest+json,{"name":"X-Esports","short_name":"X-Esports","start_url":".","display":"standalone","background_color":"#f4f6f9","theme_color":"#00aa4b"}" />
    {% endraw %}

    <style>
        :root { --bg-main: #f4f6f9; --primary-green: #00aa4b; --text-main: #1a1f26; }
        body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 0; }
        
        /* Navbar Fix */
        .navbar { background: white; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; border-bottom: 1px solid #ddd; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-green { background: var(--primary-green); color: white; }
        
        .main-container { max-width: 600px; margin: 20px auto; padding: 10px; }
        .match-card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .panel { display: none; padding: 15px; background: #fff3cd; margin-bottom: 10px; border: 1px solid #ffeeba; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="btn" onclick="toggleModal('login-modal', true)">Login / Signup</button>
        <div id="user-status" style="align-self: center; font-weight: bold;">Guest Mode</div>
    </div>

    <div class="main-container">
        <!-- Panels -->
        <div id="admin-panel" class="panel" style="background:#d4edda; color:#155724;">🛡️ Admin Control Panel</div>
        <div id="agent-panel" class="panel">💼 Agent Management Panel</div>

        <div id="matches-wrapper"></div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal">
            <h3>Account Login</h3>
            <select id="role-select">
                <option value="user">User</option>
                <option value="agent">Agent</option>
                <option value="admin">Admin</option>
            </select>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button class="btn btn-green" style="width:100%" onclick="login()">Login</button>
            <button class="btn" style="width:100%; margin-top:5px" onclick="toggleModal('login-modal', false)">Cancel</button>
        </div>
    </div>

    <script>
        // Mock Data
        const matches = [
            { id: 1, team: "Team Secret vs Liquid", odds: "1.85" },
            { id: 2, team: "MU vs Chelsea", odds: "2.10" }
        ];

        function loadMatches() {
            const container = document.getElementById('matches-wrapper');
            container.innerHTML = matches.map(m => `
                <div class="match-card">
                    <h4 style="margin-top:0">${m.team}</h4>
                    <button class="btn btn-green" onclick="alert('Bet Placed on ${m.team}')">Odds: ${m.odds}</button>
                </div>
            `).join('');
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function login() {
            const role = document.getElementById('role-select').value;
            const pass = document.getElementById('pass-input').value;

            // Simple Password Logic
            if(role === 'admin' && pass !== 'Admin@2026!') return alert('Invalid Admin Pass');
            if(role === 'agent' && pass !== 'Agent@2026!') return alert('Invalid Agent Pass');

            // Apply UI Changes
            document.getElementById('user-status').innerText = role.toUpperCase() + " Mode";
            document.getElementById('admin-panel').style.display = (role === 'admin') ? 'block' : 'none';
            document.getElementById('agent-panel').style.display = (role === 'agent') ? 'block' : 'none';
            
            toggleModal('login-modal', false);
            alert('Welcome ' + role + '!');
        }

        window.onload = loadMatches;
    </script>
</body>
</html>
