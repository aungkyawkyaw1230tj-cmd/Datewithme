<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Esports Bet - Integrated Version</title>
    
    <!-- PWA Meta Tags (Jinja2 error မတက်အောင် raw သုံးထားသည်) -->
    {% raw %}
    <link rel="manifest" href="data:application/manifest+json,{"name":"X-Esports","short_name":"X-Esports","start_url":".","display":"standalone","background_color":"#f4f6f9","theme_color":"#00aa4b"}" />
    {% endraw %}

    <style>
        :root { --primary: #00aa4b; --bg: #f4f6f9; --text: #1a1f26; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* Navbar */
        .navbar { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { font-weight: 800; color: var(--primary); }
        .balance-box { background: var(--bg); padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        
        /* Main Content */
        .container { max-width: 600px; margin: 10px auto; padding: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .odds-btn { background: #eee; border: 1px solid #ddd; padding: 10px; width: 48%; border-radius: 5px; cursor: pointer; }
        
        /* Bottom Nav */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { cursor: pointer; font-weight: bold; color: #666; }
        .nav-item.active { color: var(--primary); }

        /* Modal & Alert */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 80%; max-width: 300px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">X-ESPORTS</div>
        <div class="balance-box" id="balance">0 Coins</div>
    </div>

    <div class="container" id="app-view">
        <!-- Content inject here -->
    </div>

    <!-- Bottom Nav -->
    <div class="nav-bottom">
        <div class="nav-item active" onclick="setView('home', this)">Home</div>
        <div class="nav-item" onclick="setView('history', this)">History</div>
        <div class="nav-item" id="nav-role" onclick="setView('profile', this)">Profile</div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="login-modal" style="display:flex;">
        <div class="box">
            <h4>Login</h4>
            <select id="role-select">
                <option value="user">User</option>
                <option value="agent">Agent</option>
                <option value="admin">Admin</option>
            </select>
            <input type="password" id="pass-input" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px;">Enter</button>
        </div>
    </div>

    <!-- Alert Box -->
    <div class="modal" id="alert-modal">
        <div class="box">
            <h4 id="alert-title">Notification</h4>
            <p id="alert-msg"></p>
            <button onclick="document.getElementById('alert-modal').style.display='none'">OK</button>
        </div>
    </div>

    <script>
        let currentUser = { role: 'user', name: 'Player One', uid: 'U-998877' };
        let matches = [
            { id: 1, game: 'Football', team1: 'MU', team2: 'Chelsea', odds: 1.85 },
            { id: 2, game: 'Dota 2', team1: 'Spirit', team2: 'Liquid', odds: 2.10 }
        ];

        // 1. Auto Odds Update
        setInterval(() => {
            matches.forEach(m => m.odds = (parseFloat(m.odds) + (Math.random()-0.5)*0.1).toFixed(2));
            if(document.querySelector('.home-view')) renderHome();
        }, 3000);

        // 2. View System
        function setView(view, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            const app = document.getElementById('app-view');
            if(view === 'home') renderHome();
            else if(view === 'history') app.innerHTML = `<div class="card"><h3>History</h3><p>No transactions.</p></div>`;
            else renderProfile();
        }

        function renderHome() {
            const app = document.getElementById('app-view');
            app.innerHTML = `<div class="home-view">
                ${matches.length === 0 ? '<div class="card">No Data</div>' : matches.map(m => `
                    <div class="card">
                        <small>${m.game}</small>
                        <h4>${m.team1} vs ${m.team2}</h4>
                        <div style="display:flex; justify-content:space-between;">
                            <button class="odds-btn" onclick="bet('${m.team1}', ${m.odds})">${m.team1}: ${m.odds}</button>
                            <button class="odds-btn" onclick="bet('${m.team2}', ${m.odds})">${m.team2}: ${m.odds}</button>
                        </div>
                    </div>
                `).join('')}
                <div class="card"><h3>BET SLIP</h3><p>Select match to bet.</p></div>
            </div>`;
        }

        function renderProfile() {
            const app = document.getElementById('app-view');
            if(currentUser.role === 'user') {
                app.innerHTML = `<div class="card"><h3>Profile</h3><p>Name: ${currentUser.name}</p><p>UID: ${currentUser.uid}</p></div>`;
            } else {
                app.innerHTML = `<div class="card"><h3>Transfer (${currentUser.role.toUpperCase()})</h3>
                    <input type="text" id="uid" placeholder="Receiver UID">
                    <input type="number" id="amt" placeholder="Amount">
                    <button class="btn" style="width:100%; padding:10px;" onclick="showAlert('Success', 'Transfer Complete')">Send</button>
                </div>`;
            }
        }

        function bet(team, odds) { showAlert('Betting', 'Placed on ' + team + ' (' + odds + ')'); }
        function showAlert(t, m) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        function login() {
            const role = document.getElementById('role-select').value;
            const pass = document.getElementById('pass-input').value;
            if(role !== 'user' && pass !== 'Admin@2026!') return alert('Wrong Password');
            
            currentUser.role = role;
            document.getElementById('nav-role').innerText = (role === 'user') ? 'Profile' : 'Transfer';
            document.getElementById('login-modal').style.display = 'none';
            renderHome();
        }

        window.onload = () => renderHome();
    </script>
</body>
</html>
