<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Go On A Date With Me? 🥺</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #ffe3ec;
            background-image: radial-gradient(#ffb3c6 15%, transparent 16%), radial-gradient(#ffb3c6 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Heart Floating Animation Background */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .heart-pop {
            position: absolute;
            font-size: 24px;
            color: #ff4d6d;
            opacity: 0.6;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Main Container Card */
        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 30px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            border: 4px solid #ff758f;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.4s ease;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Images and Media */
        .meme-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        h2 {
            color: #c9184a;
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #590d22;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* Buttons CSS */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 55px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-yes, .btn-next {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .btn-yes:hover, .btn-next:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #fff0f3;
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            position: absolute;
            z-index: 999;
        }

        /* Inputs Form Style */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ff4d6d;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="date"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3c6;
            border-radius: 15px;
            font-size: 16px;
            color: #590d22;
            outline: none;
            text-align: center;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        /* Grid Selection Setup */
        .grid-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .grid-item {
            background: #fff0f3;
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-item:hover {
            background: #ffdeeb;
            transform: translateY(-3px);
        }

        .grid-item.selected {
            background: #ffdeeb;
            border-color: #ff4d6d;
            transform: scale(1.05);
        }

        /* Summary Setup */
        .summary-box {
            background: #fff0f3;
            border-radius: 20px;
            padding: 15px;
            text-align: left;
            margin-top: 15px;
        }

        .summary-item {
            font-size: 16px;
            color: #590d22;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="card">
        <div class="step active" id="step1">
            <img src="https://media.tenor.com/w9U8vAitv6gAAAAM/shrek-sad.gif" alt="Sad Shrek" class="meme-img" id="proposalImg">
            <h2>Will you go on a date with me? 🥺</h2>
            <div class="btn-container" id="proposalBtns">
                <button class="btn-yes" onclick="nextStep(2)">Yes</button>
                <button class="btn-no" id="noBtn">No</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h2>When are you free? 📅</h2>
            <div class="input-group">
                <label>Pick a date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-group">
                <label>Pick a time</label>
                <input type="time" id="timeInput">
            </div>
            <button class="btn-next" onclick="validateStep2()">Select the date</button>
        </div>

        <div class="step" id="step3">
            <h2>what are we feelin' 😉</h2>
            <p>Pick our ideal food</p>
            <div class="grid-selection" id="foodGrid">
                <div class="grid-item" onclick="selectItem(this, 'food', '🍔')">🍔</div>
                <div class="grid-item" onclick="selectItem(this, 'food', '🍣')">🍣</div>
                <div class="grid-item" onclick="selectItem(this, 'food', '🍝')">🍝</div>
                <div class="grid-item" onclick="selectItem(this, 'food', '🌮')">🌮</div>
                <div class="grid-item" onclick="selectItem(this, 'food', '🍕')">🍕</div>
            </div>
            <button class="btn-next" onclick="validateSelection('food', 4, 'mm-mm, sounds yummy!')">mmmm, sounds yummy!</button>
        </div>

        <div class="step" id="step4">
            <h2>what's your vibe? 💭</h2>
            <p>Pick our ideal activity</p>
            <div class="grid-selection" id="activityGrid">
                <div class="grid-item" onclick="selectItem(this, 'activity', '⛳')">⛳</div>
                <div class="grid-item" onclick="selectItem(this, 'activity', '🚶')">🚶</div>
                <div class="grid-item" onclick="selectItem(this, 'activity', '🎬')">🎬</div>
                <div class="grid-item" onclick="selectItem(this, 'activity', '💃')">💃</div>
                <div class="grid-item" onclick="selectItem(this, 'activity', '🎢')">🎢</div>
                <div class="grid-item" onclick="selectItem(this, 'activity', '🏝️')">🏝️</div>
            </div>
            <button class="btn-next" onclick="validateSelection('activity', 5, 'sounds like a plan!')">sounds like a plan!</button>
        </div>

        <div class="step" id="step5">
            <img src="https://i.pinimg.com/originals/db/1d/a1/db1da1b82736b69601d516ca4d7bc916.gif" alt="Happy Cat" class="meme-img">
            <h2>I got you girl. 💕</h2>
            <p>Be ready, I'm coming to get you 🚗</p>
            <div class="summary-box">
                <div class="summary-item">📅 <span id="summaryDate"></span></div>
                <div class="summary-item">⏰ <span id="summaryTime"></span></div>
                <div class="summary-item">🍽️ <span id="summaryFood"></span></div>
                <div class="summary-item">🎡 <span id="summaryActivity"></span></div>
            </div>
        </div>
    </div>

    <script>
        // Floating hearts generation
        const heartsBg = document.getElementById('heartsBg');
        const heartEmojis = ['❤️', '💖', '💗', '💓', '💕'];
        
        for (let i = 0; i < 25; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart-pop');
            heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 4 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heartsBg.appendChild(heart);
        }

        // Runaway "No" Button Logic
        const noBtn = document.getElementById('noBtn');
        const proposalBtns = document.getElementById('proposalBtns');

        const moveNoButton = () => {
            // Get container dimensions to safely bounding look
            const containerRect = proposalBtns.getBoundingClientRect();
            const cardRect = document.querySelector('.card').getBoundingClientRect();
            
            // Generate random positions within the visible card but away from Yes button
            const randomX = Math.random() * (cardRect.width - noBtn.offsetWidth - 20) - (cardRect.width/2 - noBtn.offsetWidth);
            const randomY = (Math.random() * 150) - 75; // float around standard row

            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        };

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('click', moveNoButton);

        // State variables to save inputs
        let selections = {
            date: '',
            time: '',
            food: '',
            activity: ''
        };

        function nextStep(stepNum) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        function validateStep2() {
            const dateVal = document.getElementById('dateInput').value;
            const timeVal = document.getElementById('timeInput').value;

            if(!dateVal || !timeVal) {
                alert("Please pick both date and time! 🥺");
                return;
            }

            // Format date nicely
            const options = { month: 'long', day: 'numeric', year: 'numeric' };
            selections.date = new Date(dateVal).toLocaleDateString('en-US', options);
            selections.time = timeVal;

            nextStep(3);
        }

        function selectItem(element, type, value) {
            // Remove previous selected in the same grid
            element.parentElement.querySelectorAll('.grid-item').forEach(item => item.classList.remove('selected'));
            // Add to current
            element.classList.add('selected');
            selections[type] = value;
        }

        function validateSelection(type, nextStepNum, alertMsg) {
            if(!selections[type]) {
                alert("Please pick one choice! 🥰");
                return;
            }
            
            if(nextStepNum === 5) {
                // Populate summary data before showing last screen
                document.getElementById('summaryDate').innerText = selections.date;
                document.getElementById('summaryTime').innerText = selections.time;
                document.getElementById('summaryFood').innerText = selections.food;
                document.getElementById('summaryActivity').innerText = selections.activity;
            }

            nextStep(nextStepNum);
        }
    </script>
</body>
  </html>
