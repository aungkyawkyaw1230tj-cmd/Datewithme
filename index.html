<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Esports | ပွဲစဉ်များ</title>
    <style>
        :root { --primary-green: #00aa4b; --bg-main: #f4f6f9; --text-dark: #2c3e50; }
        body { background-color: var(--bg-main); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; color: var(--text-dark); }
        
        .header { text-align: center; margin-bottom: 20px; }
        /* Tabs အတွက် အောက်ဘက်မှာ Scroll လုပ်လို့ရအောင် ပြင်ထားတယ် */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; white-space: nowrap; }
        .tab-btn { padding: 8px 16px; border: none; cursor: pointer; border-radius: 20px; background: #fff; border: 1px solid var(--primary-green); color: var(--primary-green); font-size: 14px; }
        .tab-btn.active { background: var(--primary-green); color: white; }
        
        .match-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-green); }
        .match-header { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 8px; }
        .teams { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .odds-row { display: flex; gap: 8px; }
        .odds-btn { background: #f8f9fa; border: 1px solid #dee2e6; padding: 8px; flex: 1; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .odds-btn:active { background: var(--primary-green); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>X-Esports</h2>
    </div>

    <!-- Tabs တွေကို ဒီမှာ အလိုအလျောက် ထည့်ပေးမယ် -->
    <div class="tabs" id="league-tabs">
        <button class="tab-btn active" onclick="filterMatches('all', this)">အားလုံး</button>
    </div>

    <div id="matches-list"></div>

    <script>
        let allMatches = [];
        
        async function fetchMatches() {
            try {
                const res = await fetch('/api/matches');
                allMatches = await res.json();
                
                // လိဂ်တွေကို စုပြီး Tab တွေ တည်ဆောက်မယ်
                const leagues = [...new Set(allMatches.map(m => m.league))];
                const tabContainer = document.getElementById('league-tabs');
                
                leagues.forEach(l => {
                    if(l) { // league နာမည်ရှိမှ ခလုတ်ဆောက်မယ်
                        tabContainer.innerHTML += `<button class="tab-btn" onclick="filterMatches('${l}', this)">${l}</button>`;
                    }
                });

                renderMatches(allMatches);
            } catch (err) {
                document.getElementById('matches-list').innerHTML = '<p style="text-align:center;">Data ရယူ၍မရပါ။</p>';
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            
            matches.forEach(m => {
                const date = new Date(m.match_date).toLocaleString('my-MM', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                container.innerHTML += `
                    <div class="match-card">
                        <div class="match-header">
                            <span>${date}</span>
                            <span>${m.league || m.game_type}</span>
                        </div>
                        <div class="teams">${m.team_a} vs ${m.team_b}</div>
                        <div class="odds-row">
                            <button class="odds-btn">${m.team_a}: ${m.odds_a}</button>
                            <button class="odds-btn">${m.team_b}: ${m.odds_b}</button>
                        </div>
                    </div>
                `;
            });
        }

        function filterMatches(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filtered = (category === 'all') ? allMatches : allMatches.filter(m => m.league === category || m.game_type === category);
            renderMatches(filtered);
        }

        fetchMatches();
    </script>
</body>
</html>
