<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Esports | ပွဲစဉ်များ</title>
    <style>
        :root { --primary-green: #00aa4b; --bg-main: #f4f6f9; --text-dark: #2c3e50; }
        body { background-color: var(--bg-main); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; color: var(--text-dark); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 25px; border: none; cursor: pointer; border-radius: 20px; background: #fff; border: 1px solid var(--primary-green); color: var(--primary-green); transition: 0.3s; }
        .tab-btn.active { background: var(--primary-green); color: white; }
        
        .match-card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 6px solid var(--primary-green); }
        .match-header { display: flex; justify-content: space-between; font-size: 13px; color: #7f8c8d; margin-bottom: 10px; }
        .teams { font-size: 17px; font-weight: bold; margin-bottom: 12px; }
        .odds-row { display: flex; gap: 10px; }
        .odds-btn { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; flex: 1; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .odds-btn:active { background: var(--primary-green); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>X-Esports</h2>
        <p>လက်ရှိပွဲစဉ်များ</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="filterMatches('all', this)">အားလုံး</button>
        <button class="tab-btn" onclick="filterMatches('Football', this)">Football</button>
        <button class="tab-btn" onclick="filterMatches('Esports', this)">Esports</button>
    </div>

    <div id="matches-list"></div>

    <script>
        let allMatches = [];
        
        async function fetchMatches() {
            try {
                const res = await fetch('/api/matches');
                allMatches = await res.json();
                renderMatches(allMatches);
            } catch (err) {
                document.getElementById('matches-list').innerHTML = '<p style="text-align:center;">Data ဆွဲယူ၍ မရသေးပါ။</p>';
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            
            if(matches.length === 0) {
                container.innerHTML = '<p style="text-align:center;">ပွဲစဉ်မရှိပါ။</p>';
                return;
            }

            matches.forEach(m => {
                const date = new Date(m.match_date).toLocaleString('my-MM', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                container.innerHTML += `
                    <div class="match-card">
                        <div class="match-header">
                            <span>${date}</span>
                            <span>${m.game_type}</span>
                        </div>
                        <div class="teams">${m.team_a} vs ${m.team_b}</div>
                        <div class="odds-row">
                            <button class="odds-btn">${m.team_a}: ${m.odds_a}</button>
                            <button class="odds-btn">${m.team_b}: ${m.odds_b}</button>
                        </div>
                    </div>
                `;
            });
        }

        function filterMatches(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filtered = (category === 'all') ? allMatches : allMatches.filter(m => m.game_type === category);
            renderMatches(filtered);
        }

        fetchMatches();
    </script>
</body>
</html>
