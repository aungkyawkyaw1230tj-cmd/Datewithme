<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Betting Platform</title>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #0f172a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--text);
            padding-bottom: 60px;
        }

        /* ----- HEADER STYLES ----- */
        header {
            background-color: var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--text);
            letter-spacing: 1px;
        }

        /* နာမည်နှင့် Logout ခလုတ် အရမ်းပူးမနေစေရန် ပြင်ဆင်ထားသည့် Profile Area */
        .user-profile-area {
            display: flex;
            align-items: center;
            gap: 20px; /* နာမည်နှင့် ခလုတ်ကြား အကွာအဝေး */
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .profile-username {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
        }

        .profile-balance {
            font-size: 13px;
            color: var(--success);
            font-weight: bold;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background-color: var(--danger);
            color: white;
        }

        /* ----- MAIN LAYOUT ----- */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .auth-box {
            max-width: 400px;
            margin: 80px auto;
            background-color: var(--primary);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .auth-box h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background-color: var(--accent-hover);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .auth-toggle span {
            color: var(--accent);
            text-decoration: underline;
        }

        /* ----- MATCH CARDS ----- */
        .league-section {
            margin-bottom: 40px;
        }

        .league-title {
            font-size: 18px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid var(--accent);
            color: var(--text);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .match-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-name {
            font-weight: 500;
            font-size: 16px;
        }

        .odds-btn {
            background-color: var(--secondary);
            border: 1px solid #475569;
            color: var(--text);
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .odds-btn:hover {
            border-color: var(--accent);
            background-color: rgba(37, 99, 211, 0.1);
        }

        .odds-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ----- FLOATING BETSLIP TRIGGER ----- */
        .betslip-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 99;
        }

        /* ----- MODAL POPUP ----- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--primary);
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        .modal-title {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .betslip-item {
            background-color: var(--secondary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .slip-teams {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .slip-pick {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }

        .bet-input-group {
            margin-top: 20px;
        }

        .bet-input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .bet-amount-input {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            border: 1px solid #334155;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .est-return {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 5px 0;
        }

        .return-amount {
            color: var(--success);
            font-weight: bold;
        }

        .place-bet-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--success);
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .place-bet-btn:hover {
            opacity: 0.9;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ----- HEADER BLOCK ----- -->
    <header id="main-header" class="hidden">
        <div class="logo">SPORTS BOOK</div>
        <div class="user-profile-area">
            <div class="user-info">
                <span id="display-username" class="profile-username">Guest</span>
                <span id="display-balance" class="profile-balance">Balance: 0.00 K</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <!-- ----- AUTH SECTION ----- -->
        <section id="auth-section" class="auth-box">
            <h2 id="auth-title">Login</h2>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Sign In</button>
            <div class="auth-toggle" id="auth-toggle-text" onclick="toggleAuthMode()">
                Don't have an account? <span>Register here</span>
            </div>
        </section>

        <!-- ----- SPORTSBOOK DASHBOARD ----- -->
        <main id="sportsbook-section" class="hidden">
            <div id="leagues-container">
                <!-- Data will be dynamically loaded here -->
            </div>
        </main>
    </div>

    <!-- ----- FLOATING BETSLIP BUTTON ----- -->
    <div id="betslip-btn" class="betslip-trigger" onclick="openBetslipModal()">
        Betslip (<span id="betslip-count">0</span>)
    </div>

    <!-- ----- BETSLIP MODAL POPUP ----- -->
    <div id="betslip-popup" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closeBetslipModal()">×</button>
            <div class="modal-title">Your Selection</div>
            <div id="slip-items-container">
                <!-- Selected match info inside slip -->
            </div>
            <div class="bet-input-group">
                <label>Bet Amount</label>
                <input type="number" id="bet-amount" class="bet-amount-input" placeholder="0" oninput="calculateReturns()">
            </div>
            <div class="est-return">
                <span>Estimated Return:</span>
                <span id="est-return-val" class="return-amount">0.00 K</span>
            </div>
            <button class="place-bet-btn" onclick="submitBet()">Confirm Bet</button>
        </div>
    </div>

    <!-- ----- JAVASCRIPT ENGINE ----- -->
    <script>
        let isLoginMode = true;
        let currentUser = null;
        let rawMatches = [];
        let selectedSelections = []; // Only 1 selection allowed per bet
        let liveOddsInterval = null;

        // Device ID fingerprinting
        function getDeviceId() {
            let id = localStorage.getItem('device_id');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                localStorage.setItem('device_id', id);
            }
            return id;
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        };

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Login' : 'Register Account';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('auth-toggle-text').innerHTML = isLoginMode ? 
                `Don't have an account? <span>Register here</span>` : 
                `Already have an account? <span>Login here</span>`;
        }

        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const device_id = getDeviceId();

            if (!username || !password) {
                alert("Please fill in all fields.");
                return;
            }

            const url = isLoginMode ? '/api/login' : '/api/register';
            const payload = isLoginMode ? { username, password } : { username, password, device_id };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (!response.ok || data.error) {
                    alert(data.error || "Authentication failed.");
                    return;
                }

                if (isLoginMode) {
                    currentUser = data.user;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showDashboard();
                } else {
                    alert("Registration successful! Please login.");
                    toggleAuthMode();
                }
            } catch (err) {
                alert("Server connection error.");
            }
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('sportsbook-section').classList.remove('hidden');
            
            document.getElementById('display-username').innerText = currentUser.username;
            document.getElementById('display-balance').innerText = `Balance: ${parseFloat(currentUser.balance).toFixed(2)} K`;

            fetchMatches();
            startLiveOddsEngine();
        }

        function logout() {
            clearInterval(liveOddsInterval);
            localStorage.removeItem('user');
            currentUser = null;
            selectedSelections = [];
            updateBetslipUI();

            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('sportsbook-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        async function fetchMatches() {
            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                rawMatches = Array.isArray(data) ? data : (data.data || []);
                renderLeaguesAndMatches();
            } catch (err) {
                console.error("Error loading matches:", err);
            }
        }

        // Fix: Odds တွေ ပျံမတက်အောင် ကာကွယ်ပေးထားသည့် Fetch Only Engine
        function startLiveOddsEngine() {
            liveOddsInterval = setInterval(async () => {
                if (rawMatches.length === 0) return;
                try {
                    const res = await fetch('/api/matches');
                    if (!res.ok) return;
                    const data = await res.json();
                    rawMatches = Array.isArray(data) ? data : (data.data || []);

                    // Update prices inside dynamic selection
                    selectedSelections = selectedSelections.map(sel => {
                        const currentMatch = rawMatches.find(m => m.id === sel.matchId);
                        if (currentMatch) {
                            const updatedOdds = sel.selectedTeam === currentMatch.team_a ? currentMatch.odds_a : currentMatch.odds_b;
                            return { ...sel, odds: parseFloat(updatedOdds) };
                        }
                        return sel;
                    });

                    renderLeaguesAndMatches();
                    if (document.getElementById('betslip-popup').style.display === 'flex') {
                        openBetslipModal(); 
                    }
                } catch (err) {
                    console.error("Live sync failed:", err);
                }
            }, 5000);
        }

        function renderLeaguesAndMatches() {
            const container = document.getElementById('leagues-container');
            container.innerHTML = '';

            // Group matches by league name
            const leagues = {};
            rawMatches.forEach(m => {
                if (!leagues[m.league]) leagues[m.league] = [];
                leagues[m.league].push(m);
            });

            for (let leagueName in leagues) {
                const section = document.createElement('div');
                section.className = 'league-section';

                const title = document.createElement('h3');
                title.className = 'league-title';
                title.innerText = leagueName;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'matches-grid';

                leagues[leagueName].forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';

                    const dateObj = new Date(match.match_date);
                    const formattedDate = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const isAActive = selectedSelections.some(s => s.matchId === match.id && s.selectedTeam === match.team_a) ? 'active' : '';
                    const isBActive = selectedSelections.some(s => s.matchId === match.id && s.selectedTeam === match.team_b) ? 'active' : '';

                    card.innerHTML = `
                        <div class="match-meta">
                            <span>${match.game_type || 'Football'}</span>
                            <span>${formattedDate}</span>
                        </div>
                        <div class="match-teams">
                            <div class="team-row">
                                <span class="team-name">${match.team_a}</span>
                                <button class="odds-btn ${isAActive}" onclick="selectBet('${match.id}', '${match.team_a}', ${match.odds_a})">${parseFloat(match.odds_a).toFixed(2)}</button>
                            </div>
                            <div class="team-row">
                                <span class="team-name">${match.team_b}</span>
                                <button class="odds-btn ${isBActive}" onclick="selectBet('${match.id}', '${match.team_b}', ${match.odds_b})">${parseFloat(match.odds_b).toFixed(2)}</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        function selectBet(matchId, teamName, odds) {
            const currentMatch = rawMatches.find(m => m.id == matchId);
            
            // Toggle selection logic
            const alreadySelected = selectedSelections.some(s => s.matchId === matchId && s.selectedTeam === teamName);
            
            if (alreadySelected) {
                selectedSelections = [];
            } else {
                selectedSelections = [{
                    matchId: matchId,
                    teamA: currentMatch.team_a,
                    teamB: currentMatch.team_b,
                    selectedTeam: teamName,
                    odds: parseFloat(odds)
                }];
            }

            renderLeaguesAndMatches();
            updateBetslipUI();
        }

        function updateBetslipUI() {
            const btn = document.getElementById('betslip-btn');
            const countSpan = document.getElementById('betslip-count');
            
            if (selectedSelections.length > 0) {
                btn.style.display = 'block';
                countSpan.innerText = selectedSelections.length;
            } else {
                btn.style.display = 'none';
                closeBetslipModal();
            }
        }

        function openBetslipModal() {
            if (selectedSelections.length === 0) return;
            
            const container = document.getElementById('slip-items-container');
            container.innerHTML = '';

            selectedSelections.forEach(sel => {
                const item = document.createElement('div');
                item.className = 'betslip-item';
                item.innerHTML = `
                    <div class="slip-teams">${sel.teamA} vs ${sel.teamB}</div>
                    <div class="slip-pick">
                        <span>To Win: ${sel.selectedTeam}</span>
                        <span>@ ${sel.odds.toFixed(2)}</span>
                    </div>
                `;
                container.appendChild(item);
            });

            document.getElementById('betslip-popup').style.display = 'flex';
            calculateReturns();
        }

        function closeBetslipModal() {
            document.getElementById('betslip-popup').style.display = 'none';
        }

        function calculateReturns() {
            const amtInput = document.getElementById('bet-amount').value;
            const amount = parseFloat(amtInput) || 0;
            
            if (selectedSelections.length === 0 || amount <= 0) {
                document.getElementById('est-return-val').innerText = '0.00 K';
                return;
            }

            const potentialReturn = amount * selectedSelections[0].odds;
            document.getElementById('est-return-val').innerText = potentialReturn.toFixed(2) + ' K';
        }

        async function submitBet() {
            if (selectedSelections.length === 0) return;
            
            const amountInput = document.getElementById('bet-amount').value;
            const amount = parseFloat(amountInput);

            if (!amount || amount <= 0) {
                alert("Please enter a valid bet amount.");
                return;
            }

            const activeSelection = selectedSelections[0];
            const payload = {
                username: currentUser.username,
                match_id: activeSelection.matchId,
                selected_team: activeSelection.selectedTeam,
                bet_amount: amount,
                odds: activeSelection.odds
            };

            try {
                const res = await fetch('/api/place-bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (!res.ok || data.error) {
                    alert(data.error || "Failed to place bet.");
                    return;
                }

                alert("Bet placed successfully!");
                
                // Update balance local and visual
                currentUser.balance = data.newBalance;
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('display-balance').innerText = `Balance: ${parseFloat(currentUser.balance).toFixed(2)} K`;
                
                // Reset slip
                selectedSelections = [];
                document.getElementById('bet-amount').value = '';
                updateBetslipUI();
                renderLeaguesAndMatches();

            } catch (err) {
                alert("Error connecting to server.");
            }
        }
    </script>
</body>
</html>
